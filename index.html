<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园万能墙 - 你的校园生活一站式服务</title>
    <style>
        /* --- 全局样式 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f0f2f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; }
        
        /* 头部 */
        header { background: #2c3e50; color: white; padding: 1.5rem 0; margin-bottom: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: bold; letter-spacing: 1px; }
        .logo span { color: #3498db; }

        /* --- 登录弹窗样式 --- */
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .login-overlay.active { opacity: 1; pointer-events: all; }
        
        .login-box {
            background: white; padding: 40px; border-radius: 20px;
            width: 90%; max-width: 400px; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center; transform: translateY(20px); transition: transform 0.3s ease;
        }
        .login-overlay.active .login-box { transform: translateY(0); }
        
        .login-title { font-size: 1.8rem; margin-bottom: 10px; color: #2c3e50; }
        .login-subtitle { color: #666; margin-bottom: 30px; font-size: 0.9rem; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; transition: border-color 0.3s; }
        .input-group input:focus { border-color: #3498db; outline: none; }
        
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #3498db, #2c3e50); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
        .btn-login:hover { opacity: 0.9; }

        /* --- 主内容区域 --- */
        .main-content { flex: 1; padding-bottom: 2rem; }

        /* 平台入口卡片区 */
        .platform-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 4rem; }
        .platform-card {
            background: white; border-radius: 15px; padding: 30px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none; color: inherit; position: relative; overflow: hidden;
        }
        .platform-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        /* 每个平台的主题色条 */
        .card-market::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: #ff6b6b; }
        .card-lost::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: #4facfe; }
        .card-event::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: #764ba2; }

        .platform-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .platform-title { font-size: 1.5rem; margin-bottom: 10px; font-weight: bold; }
        .platform-desc { color: #666; font-size: 0.95rem; margin-bottom: 20px; }
        .platform-btn { display: inline-block; padding: 10px 25px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        
        /* 不同平台的按钮颜色 */
        .card-market .platform-btn { background: #ff6b6b; color: white; }
        .card-lost .platform-btn { background: #4facfe; color: white; }
        .card-event .platform-btn { background: #764ba2; color: white; }

        /* 动态列表区域 */
        .section-title { font-size: 1.5rem; margin-bottom: 20px; border-left: 5px solid #2c3e50; padding-left: 15px; display: flex; justify-content: space-between; align-items: center; }
        .section-title a { font-size: 0.9rem; color: #666; text-decoration: none; }
        
        .preview-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 4rem; }
        
        /* 通用卡片样式 */
        .item-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; }
        .item-card:hover { transform: translateY(-3px); }
        .item-img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .item-body { padding: 15px; }
        .item-tag { font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; color: white; margin-bottom: 8px; display: inline-block; }
        .item-title { font-size: 1rem; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-info { font-size: 0.85rem; color: #888; display: flex; justify-content: space-between; }
        
        /* 特定颜色标签 */
        .tag-lost { background: #ff6b6b; }
        .tag-found { background: #1dd1a1; }
        .tag-sale { background: #ff9f43; }
        .tag-event { background: #764ba2; }

        footer { text-align: center; padding: 2rem; color: #999; background: white; margin-top: auto; }
    </style>
</head>
<body>

    <!-- 登录弹窗 -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2 class="login-title">欢迎回来</h2>
            <p class="login-subtitle">请登录以访问校园服务</p>
            <form id="loginForm">
                <div class="input-group">
                    <label>学号 / 用户名</label>
                    <input type="text" id="username" placeholder="请输入学号" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-login">立即登录</button>
            </form>
        </div>
    </div>

    <header>
        <div class="container header-content">
            <div class="logo">🏫 校园<span>万能墙</span></div>
            <div id="userInfo" style="display: none; align-items: center; gap: 15px;">
                <span>你好, <b id="displayUsername">同学</b></span>
                <button onclick="logout()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; border-radius:5px; cursor:pointer;">退出</button>
            </div>
            <div id="nav-buttons"></div>
        </div>
    </header>

    <main class="container main-content">
        <!-- 平台入口导航 -->
        <section class="platform-grid">
            <a href="market/market.html" class="platform-card card-market">
                <span class="platform-icon">🛒</span>
                <div class="platform-title">二手集市</div>
                <div class="platform-desc">闲置物品交易，让资源流动起来。</div>
                <span class="platform-btn">进入集市 &rarr;</span>
            </a>
            
            <a href="lost/lost.html" class="platform-card card-lost">
                <span class="platform-icon">💙</span>
                <div class="platform-title">失物招领</div>
                <div class="platform-desc">遗失物品发布与寻找，互帮互助。</div>
                <span class="platform-btn">寻找失物 &rarr;</span>
            </a>

            <a href="event/event.html" class="platform-card card-event">
                <span class="platform-icon">🚀</span>
                <div class="platform-title">活动中心</div>
                <div class="platform-desc">校园讲座、社团活动、比赛报名。</div>
                <span class="platform-btn">查看活动 &rarr;</span>
            </a>
        </section>

        <!-- 下面的列表代码保持不变... -->
        <!-- 为了节省篇幅，这里省略了列表部分的 HTML，逻辑和之前一样 -->
        <div class="section-title">最新失物招领 <a href="lost/index.html">查看全部 &rarr;</a></div>
        <div id="lostList" class="preview-list"></div>
        
        <div class="section-title">最新二手闲置 <a href="market/index.html">查看全部 &rarr;</a></div>
        <div id="marketList" class="preview-list"></div>
        
        <div class="section-title">近期热门活动 <a href="event/index.html">查看全部 &rarr;</a></div>
        <div id="eventList" class="preview-list"></div>
    </main>

    <footer>
        <p>&copy; 2026 校园万能墙。 All Platforms Connected.</p>
    </footer>

    <script src="auth.js"></script>
    
    <!-- 逻辑脚本 -->
    <script type="module">
        // --- 登录逻辑 ---
        const userInfo = document.getElementById('userInfo');
        const displayUsername = document.getElementById('displayUsername');
        // --- Firebase 数据加载逻辑 (保持原有功能) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "你的API_KEY",
            authDomain: "你的项目.firebaseapp.com",
            databaseURL: "你的项目-default-rtdb.firebaseio.com",
            projectId: "你的项目ID",
            storageBucket: "你的项目.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 通用渲染函数
        function createCardHTML(item, type) {
            let tagClass = ''; let tagName = '';
            if (type === 'lost') {
                tagClass = item.type === 'lost' ? 'tag-lost' : 'tag-found';
                tagName = item.type === 'lost' ? '遗失' : '招领';
            } else if (type === 'market') {
                tagClass = 'tag-sale'; tagName = '¥' + item.price;
            } else if (type === 'event') {
                tagClass = 'tag-event'; tagName = item.category;
            }
            const imgUrl = item.image ? item.image : 'https://via.placeholder.com/300x150?text=No+Image';
            return `
                <div class="item-card">
                    <img src="${imgUrl}" class="item-img">
                    <div class="item-body">
                        <span class="item-tag ${tagClass}">${tagName}</span>
                        <div class="item-title">${item.title}</div>
                        <div class="item-info">
                            <span>${item.location || '校内'}</span>
                            <span>${item.date || ''}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 加载数据 (逻辑与之前相同，这里简化展示)
        const itemsRef = ref(db, 'items');
        onValue(itemsRef, (snapshot) => {
            const data = snapshot.val();
            const list = [];
            if (data) {
                Object.values(data).forEach(item => { list.push(item); });
            }
            
            // 简单分类渲染
            const lostItems = list.filter(i => i.type === 'lost' || i.type === 'found').reverse().slice(0, 4);
            const marketItems = list.filter(i => i.price).reverse().slice(0, 4);
            const eventItems = list.filter(i => i.category && !i.price && !i.type).reverse().slice(0, 4);

            const render = (id, items, type) => {
                document.getElementById(id).innerHTML = items.map(i => createCardHTML(i, type)).join('');
            };

            render('lostList', lostItems, 'lost');
            render('marketList', marketItems, 'market');
            render('eventList', eventItems, 'event');
        });
    </script>
</body>
</html>
